<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Nexar App</title>

<link rel="stylesheet" href="app.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<script src="https://cdn.jsdelivr.net/npm/ethers@6.13.1/dist/ethers.umd.min.js"></script>
</head>

<body>

<div class="background"></div>

<nav>
<div class="logo">NEXAR</div>

<ul>
<li><a href="index.html">Home</a></li>
<li><a href="whitepaper.html">Whitepaper</a></li>
</ul>

<button id="connectButton">Connect Wallet</button>
</nav>

<section class="hero">
<h1>NEXAR APP</h1>
<p>Trade • Market • Portfolio</p>
</section>

<section class="dashboard">

<div class="box">
<h3>Portfolio Value</h3>
<h2 id="portfolioValue">$0</h2>
</div>

<div class="box">
<h3>BNB Balance</h3>
<h2 id="bnbBalance">0</h2>
</div>

<div class="box">
<h3>NXR Balance</h3>
<h2 id="nxrBalance">0</h2>
</div>

</section>

<section class="market">

<h2>Live Market</h2>

<div class="cards">

<div class="card">
<h3>Price</h3>
<h1 id="price">$0</h1>
</div>

<div class="card">
<h3>Market Cap</h3>
<h1 id="marketCap">$0</h1>
</div>

<div class="card">
<h3>Liquidity</h3>
<h1 id="liquidity">$0</h1>
</div>

<div class="card">
<h3>Volume</h3>
<h1 id="volume">$0</h1>
</div>

</div>

</section>

<section class="buy">

<h2>Buy NXR</h2>

<input id="amount" type="number" placeholder="Enter amount">

<button id="buyButton">Buy NXR</button>

</section>

<section class="swap">

<h2>Nexar Swap</h2>

<input placeholder="From Token">
<input placeholder="To Token">

<button id="swapButton">Swap</button>

</section>

<footer>
<div class="socials">

<a href="https://t.me/NexarEgypt"><i class="fa-brands fa-telegram"></i></a>
<a href="https://x.com/NexarToken"><i class="fa-brands fa-x-twitter"></i></a>
<a href="https://www.instagram.com/nexar.eg"><i class="fa-brands fa-instagram"></i></a>
<a href="https://www.facebook.com/share/18XgdmdWkY/"><i class="fa-brands fa-facebook"></i></a>

</div>
</footer>

<script src="notifications.js"></script>
<script src="wallet.js"></script>
<script src="market.js"></script>
<script src="dashboard.js"></script>
<script src="swap.js"></script>
<script src="app.js"></script>

</body>
</html>
