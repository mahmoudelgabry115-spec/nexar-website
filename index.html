<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexar Network (NXR) - Exchange</title>

<style>

/* ================= GLOBAL ================= */
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}
body{
background:#0a0a0a;
color:#fff;
overflow-x:hidden;
}

/* ================= LAYOUT ================= */
.container{
display:flex;
height:100vh;
}

/* ================= SIDEBAR ================= */
.sidebar{
width:220px;
background:#111;
padding:20px;
border-right:1px solid rgba(212,175,55,0.2);
}

.sidebar h2{
color:#d4af37;
margin-bottom:20px;
}

.sidebar a{
display:block;
color:#fff;
text-decoration:none;
margin:12px 0;
opacity:0.8;
cursor:pointer;
}

.sidebar a:hover{opacity:1;}

/* ================= MAIN ================= */
.main{
flex:1;
display:flex;
flex-direction:column;
}

/* ================= TOPBAR ================= */
.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#111;
border-bottom:1px solid rgba(212,175,55,0.2);
}

.logo{
color:#d4af37;
font-weight:bold;
font-size:18px;
}

/* ================= DASHBOARD ================= */
.dashboard{
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
padding:15px;
flex:1;
}

/* ================= CARDS ================= */
.card{
background:#151515;
padding:15px;
border-radius:10px;
border:1px solid rgba(212,175,55,0.15);
}

/* ================= CHART ================= */
.chart{
height:250px;
background:linear-gradient(45deg,#111,#1a1a1a);
border-radius:10px;
position:relative;
overflow:hidden;
}

.line{
position:absolute;
width:200%;
height:2px;
background:#d4af37;
top:60%;
animation:move 4s linear infinite;
}

@keyframes move{
from{left:-100%;}
to{left:100%;}
}

/* ================= BUTTONS ================= */
.btn{
display:inline-block;
padding:10px 15px;
margin:5px;
background:#d4af37;
color:#000;
font-weight:bold;
text-decoration:none;
border-radius:8px;
cursor:pointer;
transition:0.3s;
}

.btn:hover{transform:scale(1.05);}

/* ================= ORDERBOOK ================= */
.orderbook div{
padding:5px;
font-size:13px;
opacity:0.9;
}

/* ================= PRICE ================= */
.price{
font-size:32px;
color:#d4af37;
}

/* ================= GRID ================= */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:10px;
}

</style>
</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>NEXAR</h2>
<a onclick="scrollTo('chart')">Chart</a>
<a onclick="scrollTo('trade')">Trade</a>
<a onclick="scrollTo('stats')">Stats</a>
<a href="https://bscscan.com/address/0x50503105BEC1D34A4Ba6E193486911bd9bA6F0e4" target="_blank">BSCScan</a>
</div>

<!-- MAIN -->
<div class="main">

<!-- TOPBAR -->
<div class="topbar">
<div class="logo">NEXAR NETWORK (NXR)</div>
<div>
<button class="btn" onclick="copy()">Copy</button>
<button class="btn" onclick="toggle()">Theme</button>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard">

<!-- LEFT -->
<div>

<!-- PRICE -->
<div class="card">
<h3>Live Price</h3>
<div class="price" id="price">$0.00000</div>
</div>

<!-- CHART -->
<div class="card chart" id="chart">
<div class="line"></div>
</div>

<!-- STATS -->
<div class="card" id="stats">
<h3>Market Stats</h3>
<div class="grid">
<div class="card">Network: BNB</div>
<div class="card">Symbol: NXR</div>
<div class="card">Supply: 500M</div>
<div class="card">Status: LIVE</div>
</div>
</div>

</div>

<!-- RIGHT -->
<div>

<!-- TRADE -->
<div class="card" id="trade">
<h3>Trade NXR</h3>

<a class="btn" href="https://pancakeswap.finance/swap?outputCurrency=0x50503105BEC1D34A4Ba6E193486911bd9bA6F0e4" target="_blank">
BUY (DEX)
</a>

<a class="btn" onclick="alert('Sell feature coming soon')">
SELL
</a>

<a class="btn" onclick="copy()">
Copy Contract
</a>

</div>

<!-- ORDERBOOK -->
<div class="card orderbook">
<h3>Order Book</h3>
<div>Buy 0.00001 — 1200 NXR</div>
<div>Buy 0.000009 — 800 NXR</div>
<div>Sell 0.000011 — 500 NXR</div>
<div>Sell 0.000012 — 900 NXR</div>
</div>

</div>

</div>

</div>

</div>

<script>

/* PRICE LIVE SIM */
setInterval(()=>{
let p = (Math.random()*0.001).toFixed(6);
document.getElementById("price").innerText="$"+p;
},1500);

/* COPY */
function copy(){
navigator.clipboard.writeText("0x50503105BEC1D34A4Ba6E193486911bd9bA6F0e4");
alert("Copied!");
}

/* SCROLL */
function scrollTo(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* THEME */
function toggle(){
document.body.classList.toggle("light");
}

</script>

</body>
</html>
