<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexar NETWORK</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/ethers@6.6.2/dist/ethers.umd.min.js"></script>

</head>

<body>

<div class="bg"></div>

<nav>
  <div class="logo">NEXAR NETWORK</div>

  <div class="nav-actions">
    <button onclick="connectWallet()">Connect Wallet</button>
    <a href="#swap">Swap</a>
    <a href="#dashboard">Dashboard</a>
  </div>
</nav>

<header>
  <h1>Nexar Network Web3</h1>
  <p>Full Decentralized Trading Ecosystem</p>
</header>

<!-- DASHBOARD -->
<section id="dashboard" class="dashboard">

  <div class="card">
    <h3>Wallet</h3>
    <p id="wallet">Not Connected</p>
  </div>

  <div class="card">
    <h3>BNB</h3>
    <p id="bnb">0</p>
  </div>

  <div class="card">
    <h3>NXR</h3>
    <p id="nxr">0</p>
  </div>

  <div class="card">
    <h3>Total Value</h3>
    <p id="value">$0</p>
  </div>

</section>

<!-- MARKET -->
<section class="market">
  <h2>Live Market</h2>
  <p id="price">$0.0000</p>
</section>

<!-- SWAP -->
<section id="swap" class="swap">

<h2>DEX Swap</h2>

<input id="tokenIn" placeholder="Token In Address">
<input id="tokenOut" placeholder="Token Out Address">
<input id="amount" placeholder="Amount">

<button onclick="swapTokens()">Execute Swap</button>

</section>

<footer>
<p>NEXAR NETWORK © 2026</p>
</footer>

<script src="wallet.js"></script>
<script src="market.js"></script>
<script src="swap.js"></script>
<script src="app.js"></script>

</body>
</html>
