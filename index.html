<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexar Network (NXR)</title>

<style>
body{
margin:0;
font-family:Arial;
background:#070A12;
color:#fff;
}

header{
display:flex;
justify-content:space-between;
padding:15px;
background:#0e1424;
position:sticky;
top:0;
}

nav a{
color:#00e5ff;
margin:0 10px;
cursor:pointer;
text-decoration:none;
}

.section{
display:none;
padding:40px;
}

.active{
display:block;
}

.card{
background:#111a2e;
padding:20px;
margin:15px 0;
border-radius:10px;
}

.btn{
padding:10px 15px;
background:#00e5ff;
border:none;
cursor:pointer;
border-radius:8px;
font-weight:bold;
margin:5px;
}

h1 span{
color:#7c4dff;
}
</style>
</head>

<body>

<header>
<div><b>NEXAR NETWORK (NXR)</b></div>

<nav>
<a onclick="show('home')">Home</a>
<a onclick="show('trade')">Trade</a>
<a onclick="show('wallet')">Wallet</a>
<a onclick="show('whitepaper')">Whitepaper</a>
</nav>
</header>

<!-- HOME -->
<div id="home" class="section active">

<h1>NEXAR <span>NETWORK</span></h1>

<div class="card">
Live Price: <span id="price">$0.0000</span>
</div>

<button class="btn" onclick="window.open('https://pancakeswap.finance/swap?outputCurrency=0x50503105BEC1D34A4Ba6E193486911bd9bA6F0e4')">
BUY (DEX)
</button>

<button class="btn" onclick="window.open('https://bscscan.com/address/0x50503105BEC1D34A4Ba6E193486911bd9bA6F0e4')">
BSCScan
</button>

</div>

<!-- TRADE -->
<div id="trade" class="section">

<h2>Live Market (DexScreener)</h2>

<div class="card">
Loading market data...
</div>

</div>

<!-- WALLET -->
<div id="wallet" class="section">

<h2>Wallet</h2>

<button class="btn" onclick="connect()">Connect MetaMask</button>

<div class="card" id="walletInfo"></div>

</div>

<!-- WHITEPAPER -->
<div id="whitepaper" class="section">

<h2>Whitepaper</h2>

<div class="card">
Nexar Network is a Web3 ecosystem built on BNB Chain for fast and scalable digital payments.
</div>

</div>

<script>

/* NAVIGATION */
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

/* LIVE PRICE SIM */
setInterval(()=>{
document.getElementById("price").innerText =
"$" + (Math.random()*0.001).toFixed(6);
},1500);

/* WALLET CONNECT */
async function connect(){
if(window.ethereum){
const acc = await ethereum.request({method:"eth_requestAccounts"});
document.getElementById("walletInfo").innerText =
"Wallet: " + acc[0];
}else{
alert("Install MetaMask");
}
}

</script>

</body>
</html>
