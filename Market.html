<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Nexar Market</title>
<link rel="stylesheet" href="app.css">
</head>

<body>

<div class="background"></div>

<nav>
<div class="logo">NEXAR MARKET</div>
<a href="app.html">Back</a>
</nav>

<section class="market">

<h2>Live Market</h2>

<div class="cards">

<div class="card">
<h3>NXR Price</h3>
<h1 id="price">$0.001</h1>
</div>

<div class="card">
<h3>Market Cap</h3>
<h1 id="marketCap">$500K</h1>
</div>

<div class="card">
<h3>Liquidity</h3>
<h1 id="liquidity">$100K</h1>
</div>

<div class="card">
<h3>Volume</h3>
<h1 id="volume">$25K</h1>
</div>

</div>

</section>

<script src="market.js"></script>

</body>
</html>
