<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEXAR Swap</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<canvas id="stars"></canvas>

<header class="header">

<div class="brand">
<img src="assets/logo.png" class="logo">
<div>
<h2>Swap</h2>
<p>Instant Token Exchange</p>
</div>
</div>

<nav>
<a href="index.html">Home</a>
<a href="presale.html">Presale</a>
<a href="market.html">Market</a>
<a href="whitepaper.html">Whitepaper</a>
<a href="about.html">About</a>
</nav>

<button class="connectWallet">Connect Wallet</button>

</header>

<section class="hero">
<h1>SWAP TOKENS</h1>
<p>Convert crypto instantly (UI simulation)</p>
</section>

<section class="swapBox">

<div class="card">

<!-- FROM -->
<label>From</label>
<input id="fromAmount" type="number" placeholder="0.0">

<select id="fromToken">
<option value="BNB">BNB</option>
<option value="USDT">USDT</option>
<option value="ETH">ETH</option>
<option value="BTC">BTC</option>
</select>

<br><br>

<!-- TO -->
<label>To (NXR)</label>
<input id="toAmount" readonly placeholder="0.0">

<br><br>

<button class="mainBtn" onclick="calculateSwap()">
Calculate
</button>

</div>

</section>

<footer>
<p>© NEXAR Swap</p>
</footer>

<script src="animation.js"></script>
<script src="swap.js"></script>
<script src="app.js"></script>

</body>
</html>
